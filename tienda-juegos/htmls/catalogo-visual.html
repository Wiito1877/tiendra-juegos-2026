<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/estilos.css" />
    <title>Catálogo de Juegos 2026</title>
    <style>
        .catalogo-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .catalogo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .game-card {
            background: linear-gradient(135deg, var(--bg-2) 0%, #2a2a4e 100%);
            border: 2px solid var(--accent);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            height: 100%;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.1);
        }

        .game-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 30px rgba(0, 212, 255, 0.3);
            border-color: var(--accent-2);
        }

        .game-image {
            width: 100%;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            font-weight: bold;
            border-bottom: 2px solid var(--line);
            position: relative;
            overflow: hidden;
        }

        .game-image::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(0, 212, 255, 0.1) 50%, transparent 70%);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .game-info {
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .game-title {
            font-size: 16px;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .game-platforms {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: auto;
        }

        .platform-badge {
            background: var(--accent-2);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .catalogo-header {
            text-align: center;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .catalogo-header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .catalogo-header p {
            font-size: 1.1em;
            color: var(--soft);
        }

        .filter-section {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            background: var(--bg-2);
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--accent);
            color: var(--bg-1);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .game-count {
            text-align: center;
            color: var(--soft);
            margin-top: 20px;
            font-style: italic;
        }

        @media (max-width: 768px) {
            .catalogo-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }

            .game-image {
                height: 220px;
                font-size: 60px;
            }

            .catalogo-header h1 {
                font-size: 1.8em;
            }
        }

        @media (max-width: 480px) {
            .catalogo-container {
                padding: 10px;
            }

            .catalogo-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .game-image {
                height: 180px;
                font-size: 50px;
            }

            .game-info {
                padding: 10px;
            }

            .game-title {
                font-size: 14px;
                margin-bottom: 8px;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="tienda.html" class="tienda-mini">Administrador</a>
        <h1>Tienda de Juegos 2026</h1>
        <div>
            <p>Catálogo visual de juegos</p>
        </div>
    </header>

    <nav>
        <ul>
            <li><a href="catalogo.html">Carrito</a></li>
            <li><a href="catalogo-visual.html" class="active" aria-current="page">Catálogo Visual</a></li>
            <li><a href="../index.html">Home</a></li>
            <li><a href="pc.html">PC</a></li>
            <li><a href="ps4-ps5.html">PS4-PS5</a></li>
            <li><a href="contacto.html">Contacto</a></li>
        </ul>
    </nav>

    <main>
        <div class="catalogo-container">
            <div class="catalogo-header">
                <h1>Catalogo de Juegos 2026</h1>
                <p>Descubre nuestros títulos más destacados</p>
            </div>

            <div class="filter-section">
                <button class="filter-btn active" onclick="mostrarTodos()">Todos</button>
                <button class="filter-btn" onclick="filtrarPorPlataforma('PC')">PC</button>
                <button class="filter-btn" onclick="filtrarPorPlataforma('PS4-PS5')">PS4-PS5</button>
            </div>

            <div id="catalogo-grid" class="catalogo-grid"></div>
            
            <div id="game-count" class="game-count"></div>
        </div>
    </main>

    <script src="../js/global-session.js"></script>
    <script src="../js/catalogo-juegos.js"></script>
    <script>
        let juegosFiltrados = [];

        function renderCatalogo(juegos) {
            const grid = document.getElementById('catalogo-grid');
            grid.innerHTML = '';

            juegos.forEach(juego => {
                const card = document.createElement('div');
                card.className = 'game-card';

                // Usar valores por defecto si no existen
                const imagen = juego.imagen || 'GAME';
                const color = juego.color || '#00d4ff';
                const platformas = juego.plataformas.join(', ');
                const platformasHTML = juego.plataformas
                    .map(p => `<span class="platform-badge">${p}</span>`)
                    .join('');

                card.innerHTML = `
                    <div class="game-image" style="background: linear-gradient(135deg, ${color}40 0%, ${color}20 100%);">
                        <span style="font-size: 80px; text-shadow: 0 0 20px ${color};">
                            ${imagen}
                        </span>
                    </div>
                    <div class="game-info">
                        <div class="game-title">${juego.nombre}</div>
                        <div class="game-platforms">
                            ${platformasHTML}
                        </div>
                    </div>
                `;

                grid.appendChild(card);
            });

            document.getElementById('game-count').textContent = 
                `Mostrando ${juegos.length} juego${juegos.length !== 1 ? 's' : ''}`;
        }

        function mostrarTodos() {
            juegosFiltrados = obtenerCatalogo();
            renderCatalogo(juegosFiltrados);
            actualizarBotonesActivos('Todos');
        }

        function filtrarPorPlataforma(plataforma) {
            juegosFiltrados = obtenerCatalogo().filter(j => j.plataformas.includes(plataforma));
            renderCatalogo(juegosFiltrados);
            actualizarBotonesActivos(plataforma);
        }

        function actualizarBotonesActivos(tipo) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent === tipo) {
                    btn.classList.add('active');
                }
            });
        }

        // Cargar al iniciar
        mostrarTodos();
    </script>
</body>
</html>
