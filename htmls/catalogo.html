<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/estilos.css" />
    <title>Catalogo de Juegos 2026</title>
    <style>
        .catalogo-container {
            max-width: 1500px;
            margin: 0 auto;
            padding: 8px 16px;
        }

        .catalogo-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 14px;
            margin-top: 14px;
        }

        .game-card {
            background: linear-gradient(135deg, var(--bg-2) 0%, #2a2a4e 100%);
            border: 2px solid var(--accent);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            height: 100%;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.1);
            position: relative;
        }

        .game-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.3);
            border-color: var(--accent-2);
        }

        .game-image {
            width: 100%;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 54px;
            font-weight: bold;
            border-bottom: 2px solid var(--line);
            position: relative;
            overflow: hidden;
        }

        .game-image::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(0, 212, 255, 0.1) 50%, transparent 70%);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .game-info {
            padding: 10px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .game-title {
            font-size: 14px;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .game-platforms {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: auto;
        }

        .platform-badge {
            background: var(--accent-2);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .catalogo-header {
            text-align: center;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .catalogo-header h1 {
            font-size: 2em;
            margin-bottom: 6px;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .catalogo-header p {
            font-size: 1em;
            color: var(--soft);
        }

        .filter-section {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .catalogo-search {
            min-width: 260px;
            flex: 1 1 320px;
            max-width: 420px;
            padding: 10px 12px;
            border-radius: 12px;
            border: 2px solid var(--line);
            background: var(--bg-2);
            color: var(--text);
            font-family: inherit;
        }

        .catalogo-search::placeholder {
            color: var(--soft);
        }

        .catalogo-search:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.18);
        }

        .filter-btn {
            background: var(--bg-2);
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--accent);
            color: var(--bg-1);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .game-count {
            text-align: center;
            color: var(--soft);
            margin-top: 16px;
            font-style: italic;
        }

        .game-tooltip {
            position: absolute;
            left: 10px;
            right: 10px;
            bottom: 10px;
            z-index: 4;
            background: rgba(10, 10, 20, 0.92);
            border: 1px solid var(--accent);
            border-radius: 10px;
            padding: 8px 10px;
            color: #eaf7ff;
            font-size: 12px;
            line-height: 1.35;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.2s ease, transform 0.2s ease;
            pointer-events: none;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
        }

        .game-card:hover .game-tooltip {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 1200px) {
            .catalogo-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (max-width: 992px) {
            .catalogo-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .catalogo-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .game-image {
                height: 130px;
                font-size: 44px;
            }

            .catalogo-header h1 {
                font-size: 1.5em;
            }
        }

        @media (max-width: 480px) {
            .catalogo-container {
                padding: 10px;
            }

            .catalogo-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .game-image {
                height: 120px;
                font-size: 40px;
            }

            .game-info {
                padding: 10px;
            }

            .game-title {
                font-size: 14px;
                margin-bottom: 8px;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="tienda.html" class="tienda-mini">Administrador</a>
        <h1>Tienda de Juegos 2026</h1>
        <div>
            <p>Catalogo visual de juegos</p>
        </div>
    </header>

    <nav>
        <ul>
            <li><a href="catalogo.html" class="active" aria-current="page">Catalogo</a></li>
            <li><a href="carrito-venta.html">Carrito de Venta</a></li>
            <li><a href="../index.html">Home</a></li>
            <li><a href="pc.html">PC</a></li>
            <li><a href="ps4-ps5.html">PS4-PS5</a></li>
            <li><a href="contacto.html">Contacto</a></li>
        </ul>
    </nav>

    <main>
        <div class="catalogo-container">
            <div class="catalogo-header">
                <h1>Catalogo de Juegos 2026</h1>
                <p>Descubre nuestros titulos mas destacados</p>
            </div>

            <div class="filter-section">
                <input id="catalogo-search" class="catalogo-search" type="search" placeholder="Buscar juego por nombre..." />
                <button class="filter-btn active" onclick="mostrarTodos()">Todos</button>
                <button class="filter-btn" onclick="filtrarPorPlataforma('PC')">PC</button>
                <button class="filter-btn" onclick="filtrarPorPlataforma('PS4-PS5')">PS4-PS5</button>
            </div>

            <div id="catalogo-grid" class="catalogo-grid"></div>
            <div id="game-count" class="game-count"></div>
        </div>
    </main>

    <script src="../js/global-session.js"></script>
    <script src="../js/catalogo-juegos.js"></script>
    <script>
        let juegosFiltrados = [];
        let plataformaActiva = 'Todos';
        let terminoBusqueda = '';

        function escaparHTML(texto) {
            return String(texto || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function normalizarTexto(texto) {
            return String(texto || '')
                .toLowerCase()
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '');
        }

        function renderCatalogo(juegos) {
            const grid = document.getElementById('catalogo-grid');
            grid.innerHTML = '';

            if (!juegos.length) {
                grid.innerHTML = '<p class="nota" style="grid-column: 1 / -1; text-align: center;">No se encontraron juegos con ese nombre.</p>';
            }

            juegos.forEach(juego => {
                const card = document.createElement('div');
                card.className = 'game-card';

                const imagen = juego.imagen || 'GAME';
                const color = juego.color || '#00d4ff';
                const descripcion = juego.descripcion || 'Sin descripcion disponible.';
                const platformasHTML = juego.plataformas
                    .map(p => `<span class="platform-badge">${p}</span>`)
                    .join('');

                card.innerHTML = `
                    <div class="game-image" style="background: linear-gradient(135deg, ${color}40 0%, ${color}20 100%);">
                        <span style="font-size: 36px; text-shadow: 0 0 20px ${color};">${escaparHTML(imagen)}</span>
                    </div>
                    <div class="game-info">
                        <div class="game-title">${escaparHTML(juego.nombre)}</div>
                        <div class="game-platforms">${platformasHTML}</div>
                    </div>
                    <div class="game-tooltip">${escaparHTML(descripcion)}</div>
                `;

                grid.appendChild(card);
            });

            document.getElementById('game-count').textContent =
                `Mostrando ${juegos.length} juego${juegos.length !== 1 ? 's' : ''}`;
        }

        function aplicarFiltros() {
            const catalogo = obtenerCatalogo();
            const termino = normalizarTexto(terminoBusqueda);

            juegosFiltrados = catalogo.filter(juego => {
                const coincidePlataforma = plataformaActiva === 'Todos'
                    ? true
                    : juego.plataformas.includes(plataformaActiva);

                const coincideNombre = !termino
                    ? true
                    : normalizarTexto(juego.nombre).includes(termino);

                return coincidePlataforma && coincideNombre;
            });

            renderCatalogo(juegosFiltrados);
        }

        function mostrarTodos() {
            plataformaActiva = 'Todos';
            aplicarFiltros();
            actualizarBotonesActivos('Todos');
        }

        function filtrarPorPlataforma(plataforma) {
            plataformaActiva = plataforma;
            aplicarFiltros();
            actualizarBotonesActivos(plataforma);
        }

        function actualizarBotonesActivos(tipo) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent === tipo) {
                    btn.classList.add('active');
                }
            });
        }

        function configurarBusquedaCatalogo() {
            const inputBusqueda = document.getElementById('catalogo-search');
            if (!inputBusqueda) return;

            inputBusqueda.addEventListener('input', function () {
                terminoBusqueda = inputBusqueda.value;
                aplicarFiltros();
            });
        }

        configurarBusquedaCatalogo();
        mostrarTodos();
    </script>
    <script src="../js/ventas.js"></script>
</body>
</html>
